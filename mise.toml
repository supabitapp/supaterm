[tools]
hk = "1.45.0"
pkl = "0.31.1"
zig = "0.16.0"
tuist = "4.192.3"
swiftlint = "latest"
xcbeautify = "3.2.1"
pnpm = "10.32.1"
"npm:create-dmg" = { version = "latest", os = ["macos"] }

[env]
HK_MISE = "1"

[hooks]
postinstall = '''
set -e
command -v vp >/dev/null 2>&1 || curl -fsSL https://vite.plus | bash
make install-git-hooks
'''
