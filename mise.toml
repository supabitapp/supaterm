[tools]
zig = "0.15.2"
tuist = "4.180.0"
swiftlint = "latest"
xcbeautify = "3.1.4"
pnpm = "10.32.1"
"npm:create-dmg" = { version = "latest", os = ["macos"] }

[tasks.validate-pre-commit]
run = "python3 .github/scripts/bump_and_release.py validate-pre-commit"

[tasks.validate-pre-push]
run = "python3 .github/scripts/bump_and_release.py validate-pre-push"

[hooks]
postinstall = '''
set -e
command -v vp >/dev/null 2>&1 || curl -fsSL https://vite.plus | bash
make install-git-hooks
'''
