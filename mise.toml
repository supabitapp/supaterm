[tools]
hk = "1.44.2"
pkl = "0.31.1"
"aqua:betterleaks/betterleaks" = "1.1.2"
zig = "0.15.2"
tuist = "4.180.0"
swiftlint = "latest"
xcbeautify = "3.1.4"
pnpm = "10.32.1"
"npm:create-dmg" = { version = "latest", os = ["macos"] }

[env]
HK_MISE = "1"

[hooks]
postinstall = '''
set -e
command -v vp >/dev/null 2>&1 || curl -fsSL https://vite.plus | bash
make install-git-hooks
'''
