[tools]
hk = "1.45.0"
pkl = "0.31.1"
zig = "0.15.2"
rust = "1.95.0"
tuist = "4.192.3"
swiftlint = "0.63.2"
xcbeautify = "3.2.1"
pnpm = "10.32.1"
"npm:create-dmg" = { version = "8.1.0", os = ["macos"] }
periphery = "3.7.4"

[env]
HK_MISE = "1"

[hooks]
postinstall = '''
set -e
command -v vp >/dev/null 2>&1 || curl -fsSL https://vite.plus | bash
make install-git-hooks
'''
