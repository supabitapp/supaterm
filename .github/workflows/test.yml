name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Capture toolchain fingerprint
        id: toolchain
        shell: bash
        run: |
          xcode_version="$(xcodebuild -version | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]+$//')"
          swift_version="$(swift --version | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]+$//')"
          toolchain_hash="$(printf '%s\n%s\n' "$xcode_version" "$swift_version" | shasum -a 256 | awk '{print $1}')"

          printf 'Xcode version: %s\n' "$xcode_version"
          printf 'Swift version: %s\n' "$swift_version"
          printf 'Toolchain hash: %s\n' "$toolchain_hash"

          echo "xcode_version=$xcode_version" >> "$GITHUB_OUTPUT"
          echo "swift_version=$swift_version" >> "$GITHUB_OUTPUT"
          echo "toolchain_hash=$toolchain_hash" >> "$GITHUB_OUTPUT"
      - name: Cache Tuist repositories
        uses: actions/cache@v5
        with:
          path: Tuist/.build/repositories
          key: ${{ runner.os }}-${{ runner.arch }}-tuist-repositories-${{ hashFiles('Tuist/Package.resolved', 'Tuist/Package.swift', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-tuist-repositories-
      - name: Cache Tuist prebuilts
        uses: actions/cache@v5
        with:
          path: Tuist/.build/prebuilts
          key: ${{ runner.os }}-${{ runner.arch }}-tuist-prebuilts-${{ steps.toolchain.outputs.toolchain_hash }}-${{ hashFiles('Tuist/Package.resolved', 'Tuist/Package.swift', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-tuist-prebuilts-${{ steps.toolchain.outputs.toolchain_hash }}-
      - run: brew install mise
      - run: mise install
      - run: make inspect-dependencies
      - run: make lint
      - run: make build-app
      - run: make test

  warm-cache:
    runs-on: macos-26
    needs:
      - build
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Capture toolchain fingerprint
        id: toolchain
        shell: bash
        run: |
          xcode_version="$(xcodebuild -version | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]+$//')"
          swift_version="$(swift --version | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]+$//')"
          toolchain_hash="$(printf '%s\n%s\n' "$xcode_version" "$swift_version" | shasum -a 256 | awk '{print $1}')"

          printf 'Xcode version: %s\n' "$xcode_version"
          printf 'Swift version: %s\n' "$swift_version"
          printf 'Toolchain hash: %s\n' "$toolchain_hash"

          echo "xcode_version=$xcode_version" >> "$GITHUB_OUTPUT"
          echo "swift_version=$swift_version" >> "$GITHUB_OUTPUT"
          echo "toolchain_hash=$toolchain_hash" >> "$GITHUB_OUTPUT"
      - name: Cache Tuist repositories
        uses: actions/cache@v5
        with:
          path: Tuist/.build/repositories
          key: ${{ runner.os }}-${{ runner.arch }}-tuist-repositories-${{ hashFiles('Tuist/Package.resolved', 'Tuist/Package.swift', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-tuist-repositories-
      - name: Cache Tuist prebuilts
        uses: actions/cache@v5
        with:
          path: Tuist/.build/prebuilts
          key: ${{ runner.os }}-${{ runner.arch }}-tuist-prebuilts-${{ steps.toolchain.outputs.toolchain_hash }}-${{ hashFiles('Tuist/Package.resolved', 'Tuist/Package.swift', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-tuist-prebuilts-${{ steps.toolchain.outputs.toolchain_hash }}-
      - run: brew install mise
      - run: mise install
      - name: Ensure Tuist token is configured
        shell: bash
        run: |
          if [ -z "${TUIST_TOKEN:-}" ]; then
            echo "::error::TUIST_TOKEN is required to warm the Tuist remote cache."
            exit 1
          fi
      - run: make warm-cache
