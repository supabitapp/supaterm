name: test

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - parallel:
          - run: make swiftlint
          - run: make mac-tuist-install
      - run: make mac-tuist-generate
      - parallel:
          - run: make mac-build-ghostty
          - run: make mac-build-zmx
      - run: make mac-scan-dead-code
      - run: make mac-test-xcodebuild
      - run: make mac-test-snapshots
