name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - run: make inspect-dependencies
      - run: make lint
      - run: make build-app
      - run: make test

  warm-cache:
    runs-on: macos-26
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - name: Ensure Tuist token is configured
        shell: bash
        run: |
          if [ -z "${TUIST_TOKEN:-}" ]; then
            echo "::error::TUIST_TOKEN is required to warm the Tuist remote cache."
            exit 1
          fi
      - run: make warm-cache
