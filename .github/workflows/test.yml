name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: jdx/mise-action@v3
        with:
          version: 2026.3.0
          cache: true
          install: false
      - name: Install pnpm with mise
        run: mise install pnpm
      - name: Resolve Vite+ version
        id: vite_plus
        shell: bash
        run: |
          VERSION=$(node -e 'const fs = require("fs"); const lock = fs.readFileSync("apps/supaterm.com/pnpm-lock.yaml", "utf8"); const match = lock.match(/\n  vite-plus@([0-9][^:]+):/); if (!match) throw new Error("Unable to resolve vite-plus version from apps/supaterm.com/pnpm-lock.yaml"); process.stdout.write(match[1]);')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Install Vite+
        run: npm install --global "vite-plus@${{ steps.vite_plus.outputs.version }}"
      - run: make web-install
      - run: make web-check
      - run: make web-build

  inspect-dependencies:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - run: make mac-inspect-dependencies

  build:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - run: make mac-lint
      - run: make mac-test

  warm-cache:
    runs-on: macos-26
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - name: Ensure Tuist token is configured
        shell: bash
        run: |
          if [ -z "${TUIST_TOKEN:-}" ]; then
            echo "::error::TUIST_TOKEN is required to warm the Tuist remote cache."
            exit 1
          fi
      - run: make mac-warm-cache
