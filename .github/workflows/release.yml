name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: stable-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
      DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
      APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
      APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          submodules: recursive
      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
      - uses: ./.github/actions/setup-macos
      - name: Validate release tag
        run: /usr/bin/python3 .github/scripts/bump_and_release.py validate-release-tag "$RELEASE_TAG"
      - name: Ensure draft release exists
        run: |
          RELEASE_STATE=$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft' -R "${{ github.repository }}" 2>/dev/null || true)
          if [ "$RELEASE_STATE" = "false" ]; then
            echo "::error::Release $RELEASE_TAG is already published"
            exit 1
          fi
          if [ "$RELEASE_STATE" != "true" ]; then
            gh release create "$RELEASE_TAG" --draft --verify-tag --notes-from-tag
          fi
      - name: Ensure Tuist token is configured
        shell: bash
        run: |
          if [ -z "${TUIST_TOKEN:-}" ]; then
            echo "::error::TUIST_TOKEN is required for the release workflow."
            exit 1
          fi
      - name: Compute stable build number
        run: |
          BASE=$(awk -F' = ' '/^CURRENT_PROJECT_VERSION = [0-9]+$/{print $2; exit}' apps/mac/Configurations/Project.xcconfig)
          BUILD_NUMBER=$((BASE * 1000))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
      - name: Setup keychain
        run: |
          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > build-cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import build-cert.p12 -k build.keychain -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild > /dev/null
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain > /dev/null
          existing_keychains=()
          while IFS= read -r keychain; do
            existing_keychains+=("$keychain")
          done < <(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s build.keychain "${existing_keychains[@]}"
          security default-keychain -s build.keychain
          DEVELOPER_ID_IDENTITY_SHA=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$DEVELOPER_ID_IDENTITY_SHA" ]; then
            echo "::error::Developer ID Application identity not found in keychain"
            exit 1
          fi
          echo "DEVELOPER_ID_IDENTITY_SHA=$DEVELOPER_ID_IDENTITY_SHA" >> "$GITHUB_ENV"
      - run: make mac-archive XCODEBUILD_FLAGS='CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }}'
      - name: Write export options
        run: |
          mkdir -p apps/mac/build
          cat > apps/mac/build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>$DEVELOPER_ID_IDENTITY</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF
      - run: make mac-export-archive
      - name: Re-sign frameworks
        run: bash ./.github/scripts/resign_exported_app.sh apps/mac/build/export
      - name: Store notarization credentials
        run: |
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          xcrun notarytool store-credentials "notarytool-profile" \
            --key notarization_key.p8 \
            --key-id "$APPLE_NOTARIZATION_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm notarization_key.p8
      - name: Build DMG
        run: |
          APP_PATH=$(find apps/mac/build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          mise exec -- create-dmg "$APP_PATH" apps/mac/build/ \
            --overwrite \
            --dmg-title="Supaterm" \
            --identity="$DEVELOPER_ID_IDENTITY_SHA"
          DMG_OUTPUT=$(find apps/mac/build -maxdepth 1 -name '*.dmg' -print -quit)
          if [ "$DMG_OUTPUT" != "apps/mac/build/supaterm.dmg" ]; then
            mv "$DMG_OUTPUT" apps/mac/build/supaterm.dmg
          fi
      - name: Notarize and staple
        run: |
          set -euo pipefail
          APP_PATH=$(find apps/mac/build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          NOTARY_RESULT_PATH=apps/mac/build/notarytool-submit.json
          NOTARY_LOG_PATH=apps/mac/build/notarytool-log.json
          NOTARY_STATUS=""
          NOTARY_ID=""
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            submit_exit=0
            if ! xcrun notarytool submit apps/mac/build/supaterm.dmg \
              --keychain-profile "notarytool-profile" \
              --wait \
              --output-format json > "$NOTARY_RESULT_PATH"; then
              submit_exit=$?
            fi
            cat "$NOTARY_RESULT_PATH" || true
            NOTARY_STATUS=$(/usr/bin/python3 -c 'import json, pathlib, sys; p = pathlib.Path(sys.argv[1]); data = json.load(p.open()) if p.exists() else {}; print(data.get("status", ""))' "$NOTARY_RESULT_PATH" 2>/dev/null || true)
            NOTARY_ID=$(/usr/bin/python3 -c 'import json, pathlib, sys; p = pathlib.Path(sys.argv[1]); data = json.load(p.open()) if p.exists() else {}; print(data.get("id", ""))' "$NOTARY_RESULT_PATH" 2>/dev/null || true)
            if [ "$submit_exit" -eq 0 ] && [ "$NOTARY_STATUS" = "Accepted" ]; then
              break
            fi
            if [ -n "$NOTARY_ID" ]; then
              xcrun notarytool log "$NOTARY_ID" --keychain-profile "notarytool-profile" > "$NOTARY_LOG_PATH" || true
              cat "$NOTARY_LOG_PATH" || true
            fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$NOTARY_STATUS'"
            exit 1
          fi
          xcrun stapler staple apps/mac/build/supaterm.dmg
          xcrun stapler staple "$APP_PATH"
      - name: Create app zip
        run: |
          APP_PATH=$(find apps/mac/build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" apps/mac/build/supaterm.app.zip
      - uses: actions/upload-artifact@v6
        with:
          name: dsyms
          if-no-files-found: error
          path: apps/mac/build/supaterm.xcarchive/dSYMs/**
      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION=$(awk -F'"' '/sparkle-project\/Sparkle/ { print $4; exit }' apps/mac/Tuist/Package.swift)
          if [ -z "$SPARKLE_VERSION" ]; then
            echo "::error::Unable to determine Sparkle version"
            exit 1
          fi
          rm -rf apps/mac/build/sparkle-tools
          mkdir -p apps/mac/build/sparkle-tools
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-for-Swift-Package-Manager.zip" -o apps/mac/build/sparkle-tools/sparkle.zip
          unzip -q apps/mac/build/sparkle-tools/sparkle.zip -d apps/mac/build/sparkle-tools
      - name: Generate stable appcast
        run: |
          set -euo pipefail
          STAGING=$(mktemp -d)
          cp apps/mac/build/supaterm.app.zip "$STAGING/"
          printf "%s" "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n\t ' | apps/mac/build/sparkle-tools/bin/generate_appcast \
            --download-url-prefix "https://supaterm.com/download/latest/" \
            --maximum-versions 1 \
            --ed-key-file - "$STAGING"
          cp "$STAGING/appcast.xml" apps/mac/build/appcast.xml
      - uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          if-no-files-found: error
          path: |
            apps/mac/build/supaterm.dmg
            apps/mac/build/supaterm.app.zip
            apps/mac/build/appcast.xml

  sentry-dsym:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Install sentry-cli
        run: curl -sL https://sentry.io/get-cli/ | sh
      - uses: actions/download-artifact@v7
        with:
          name: dsyms
          path: dsyms
      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: supabit
          SENTRY_PROJECT: supaterm
        run: sentry-cli debug-files upload --include-sources dsyms

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: apps/mac/build
      - name: Upload release assets
        run: |
          gh release upload "$RELEASE_TAG" \
            apps/mac/build/supaterm.dmg \
            apps/mac/build/supaterm.app.zip \
            apps/mac/build/appcast.xml \
            --clobber \
            -R "${{ github.repository }}"
      - name: Publish release
        run: gh release edit "$RELEASE_TAG" --draft=false -R "${{ github.repository }}"
