name: deploy-web

on:
  push:
    branches:
      - main
    paths:
      - "apps/supaterm.com/**"
      - ".github/workflows/deploy-web.yml"
      - "Makefile"
  pull_request:
    branches:
      - main
    paths:
      - "apps/supaterm.com/**"
      - ".github/workflows/deploy-web.yml"
      - "Makefile"
  workflow_dispatch: {}

concurrency:
  group: deploy-web-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  web:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.0
          cache: true
          install: false
      - name: Install pnpm with mise
        run: mise install pnpm
      - name: Resolve Vite+ version
        id: vite_plus
        shell: bash
        run: |
          VERSION=$(node -e 'const fs = require("fs"); const lock = fs.readFileSync("apps/supaterm.com/pnpm-lock.yaml", "utf8"); const match = lock.match(/\n  vite-plus@([0-9][^:]+):/); if (!match) throw new Error("Unable to resolve vite-plus version from apps/supaterm.com/pnpm-lock.yaml"); process.stdout.write(match[1]);')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Install Vite+
        run: npm install --global "vite-plus@${{ steps.vite_plus.outputs.version }}"
      - run: make web-install
      - run: make web-check
      - run: make web-build
      - name: Deploy Worker
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/supaterm.com
          command: deploy
