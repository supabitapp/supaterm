name: release-tip

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check if tip release already exists for this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIP_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/tip --jq '.object.sha' 2>/dev/null || echo "")
          ASSET_COUNT=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
          if [ "$TIP_SHA" = "${{ github.sha }}" ] && [ "$ASSET_COUNT" -gt 0 ]; then
            echo "Tip already points at ${{ github.sha }} with $ASSET_COUNT assets, skipping"
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: macos-26
    needs:
      - check
    if: needs.check.outputs.should_skip != 'true'
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUIST_GENERATE_CACHE_PROFILE: none
      DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
      APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
      APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - run: brew install mise
      - run: mise install
      - name: Compute tip build number
        run: |
          BASE=$(awk -F' = ' '/^CURRENT_PROJECT_VERSION = [0-9]+$/{print $2; exit}' Configurations/Project.xcconfig)
          OFFSET=${{ github.run_number }}
          if [ "$OFFSET" -gt 999 ]; then
            echo "::error::Tip run_number ($OFFSET) exceeds 999. Bump CURRENT_PROJECT_VERSION before the next tip release."
            exit 1
          fi
          BUILD_NUMBER=$((BASE * 1000 + OFFSET))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
      - name: Setup keychain
        run: |
          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > build-cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import build-cert.p12 -k build.keychain -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild > /dev/null
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain > /dev/null
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          DEVELOPER_ID_IDENTITY_SHA=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$DEVELOPER_ID_IDENTITY_SHA" ]; then
            echo "::error::Developer ID Application identity not found in keychain"
            exit 1
          fi
          echo "DEVELOPER_ID_IDENTITY_SHA=$DEVELOPER_ID_IDENTITY_SHA" >> "$GITHUB_ENV"
      - run: make generate-project
      - run: make archive XCODEBUILD_FLAGS='CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }}'
      - name: Write export options
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>$DEVELOPER_ID_IDENTITY</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF
      - run: make export-archive
      - name: Re-sign Sparkle framework
        run: |
          set -euo pipefail
          APP_PATH=$(find build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          SPARKLE_DIR=$(find "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions" -mindepth 1 -maxdepth 1 -type d ! -name Current -print -quit)
          codesign -f -s "$DEVELOPER_ID_IDENTITY_SHA" -o runtime --timestamp -v "$SPARKLE_DIR/XPCServices/Installer.xpc"
          codesign -f -s "$DEVELOPER_ID_IDENTITY_SHA" -o runtime --timestamp --preserve-metadata=entitlements -v "$SPARKLE_DIR/XPCServices/Downloader.xpc"
          codesign -f -s "$DEVELOPER_ID_IDENTITY_SHA" -o runtime --timestamp -v "$SPARKLE_DIR/Updater.app"
          codesign -f -s "$DEVELOPER_ID_IDENTITY_SHA" -o runtime --timestamp -v "$SPARKLE_DIR/Autoupdate"
          codesign -f -s "$DEVELOPER_ID_IDENTITY_SHA" -o runtime --timestamp -v "$SPARKLE_DIR/Sparkle"
          codesign -f -s "$DEVELOPER_ID_IDENTITY_SHA" -o runtime --timestamp -v "$APP_PATH/Contents/Frameworks/Sparkle.framework"
          codesign -f -s "$DEVELOPER_ID_IDENTITY_SHA" -o runtime --timestamp --preserve-metadata=entitlements,requirements,flags -v "$APP_PATH"
          codesign -vvv --deep --strict "$APP_PATH"
      - name: Store notarization credentials
        run: |
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          xcrun notarytool store-credentials "notarytool-profile" \
            --key notarization_key.p8 \
            --key-id "$APPLE_NOTARIZATION_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm notarization_key.p8
      - name: Build DMG
        run: |
          APP_PATH=$(find build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          mise exec -- create-dmg "$APP_PATH" build/ \
            --overwrite \
            --dmg-title="Supaterm" \
            --identity="$DEVELOPER_ID_IDENTITY_SHA"
          DMG_OUTPUT=$(find build -maxdepth 1 -name '*.dmg' -print -quit)
          if [ "$DMG_OUTPUT" != "build/supaterm.dmg" ]; then
            mv "$DMG_OUTPUT" build/supaterm.dmg
          fi
      - name: Notarize and staple
        run: |
          APP_PATH=$(find build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            xcrun notarytool submit build/supaterm.dmg --keychain-profile "notarytool-profile" --wait && break
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          xcrun stapler staple build/supaterm.dmg
          xcrun stapler staple "$APP_PATH"
      - name: Create app zip
        run: |
          APP_PATH=$(find build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/supaterm.app.zip
      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION=$(awk -F'"' '/sparkle-project\/Sparkle/ { print $4; exit }' Tuist/Package.swift)
          if [ -z "$SPARKLE_VERSION" ]; then
            echo "::error::Unable to determine Sparkle version"
            exit 1
          fi
          rm -rf build/sparkle-tools
          mkdir -p build/sparkle-tools
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-for-Swift-Package-Manager.zip" -o build/sparkle-tools/sparkle.zip
          unzip -q build/sparkle-tools/sparkle.zip -d build/sparkle-tools
      - name: Generate tip appcast
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MAX_DELTAS=10
          STAGING=$(mktemp -d)
          cp build/supaterm.app.zip "$STAGING/"
          ASSETS=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for asset in $ASSETS; do
            case "$asset" in
              supaterm-history-*.app.zip)
                gh release download tip -p "$asset" -O "$STAGING/$asset" -R "${{ github.repository }}" 2>/dev/null || true
                ;;
            esac
          done
          printf "%s" "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n\t ' | build/sparkle-tools/bin/generate_appcast \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/tip/" \
            --maximum-versions $((MAX_DELTAS + 1)) \
            --maximum-deltas $MAX_DELTAS \
            --delta-compression lzma \
            --ed-key-file - "$STAGING"
          cp "$STAGING/appcast.xml" build/appcast.xml
          find "$STAGING" -name '*.delta' -exec cp {} build/ \; 2>/dev/null || true
      - uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          if-no-files-found: ignore
          path: |
            build/supaterm.dmg
            build/supaterm.app.zip
            build/appcast.xml
            build/*.delta

  tag:
    runs-on: ubuntu-latest
    needs:
      - check
      - build
    if: needs.check.outputs.should_skip != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Force-move tip tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa tip -m "Latest Continuous Release" ${{ github.sha }}
          git push --force origin tip

  publish:
    runs-on: ubuntu-latest
    needs:
      - check
      - build
      - tag
    if: needs.check.outputs.should_skip != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: build
      - name: Update tip release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create tip --prerelease --title "Supaterm Tip" --target "${{ github.sha }}" --notes "" -R "${{ github.repository }}" 2>/dev/null || \
          gh release edit tip --prerelease --title "Supaterm Tip" --target "${{ github.sha }}" -R "${{ github.repository }}"
          STALE_DELTAS=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '.assets[].name | select(endswith(".delta"))' 2>/dev/null || true)
          for delta in $STALE_DELTAS; do
            gh release delete-asset tip "$delta" -R "${{ github.repository }}" -y 2>/dev/null || true
          done
          DELTA_FILES=$(find build -name '*.delta' -type f 2>/dev/null | tr '\n' ' ' || true)
          gh release upload tip build/supaterm.dmg build/supaterm.app.zip build/appcast.xml $DELTA_FILES --clobber -R "${{ github.repository }}"
          MAX_DELTAS=10
          cp build/supaterm.app.zip "build/supaterm-history-${{ github.run_number }}.app.zip"
          gh release upload tip "build/supaterm-history-${{ github.run_number }}.app.zip" --clobber -R "${{ github.repository }}"
          HISTORY=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '[.assets[].name | select(startswith("supaterm-history-"))] | sort | reverse' 2>/dev/null || echo "[]")
          PRUNE=$(echo "$HISTORY" | jq -r ".[$MAX_DELTAS:][]" 2>/dev/null || true)
          for old in $PRUNE; do
            gh release delete-asset tip "$old" -R "${{ github.repository }}" -y 2>/dev/null || true
          done
