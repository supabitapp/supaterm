name: release-tip

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main

concurrency:
  group: ${{ github.event.workflow_run.conclusion == 'success' && 'release-tip' || github.run_id }}
  cancel-in-progress: true

env:
  RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
    outputs:
      build-number: ${{ steps.build-number.outputs.build-number }}
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
      APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
      APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SHA }}
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - name: Compute tip build number
        id: build-number
        run: |
          BUILD_NUMBER=$(/usr/bin/python3 .github/scripts/bump_and_release.py tip-build-number "${{ github.run_number }}")
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "build-number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
      - parallel:
          - name: Setup keychain
            run: |
              echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > build-cert.p12
              security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
              security set-keychain-settings -t 3600 -u build.keychain
              security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
              security import build-cert.p12 -k build.keychain -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild > /dev/null
              security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain > /dev/null
              existing_keychains=()
              while IFS= read -r keychain; do
                existing_keychains+=("$keychain")
              done < <(security list-keychains -d user | tr -d '"')
              security list-keychains -d user -s build.keychain "${existing_keychains[@]}"
              security default-keychain -s build.keychain
              DEVELOPER_ID_IDENTITY_SHA=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
              if [ -z "$DEVELOPER_ID_IDENTITY_SHA" ]; then
                echo "::error::Developer ID Application identity not found in keychain"
                exit 1
              fi
              echo "DEVELOPER_ID_IDENTITY_SHA=$DEVELOPER_ID_IDENTITY_SHA" >> "$GITHUB_ENV"
          - run: make mac-tuist-install
      - run: make mac-tuist-generate-release-cached
      - parallel:
          - run: make mac-build-ghostty
          - run: make mac-build-zmx
          - run: make mac-build-ap
      - run: make mac-archive-xcodebuild XCODEBUILD_FLAGS='CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }}'
      - name: Write export options
        run: |
          mkdir -p apps/mac/build
          cat > apps/mac/build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>$DEVELOPER_ID_IDENTITY</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF
      - run: make mac-export-archive
      - name: Re-sign embedded code
        run: bash ./.github/scripts/resign_exported_app.sh apps/mac/build/export
      - name: Store notarization credentials
        run: |
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          xcrun notarytool store-credentials "notarytool-profile" \
            --key notarization_key.p8 \
            --key-id "$APPLE_NOTARIZATION_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm notarization_key.p8
      - name: Build DMG
        run: |
          APP_PATH=$(find apps/mac/build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          mise exec -- create-dmg "$APP_PATH" apps/mac/build/ \
            --overwrite \
            --dmg-title="Supaterm" \
            --identity="$DEVELOPER_ID_IDENTITY_SHA"
          DMG_OUTPUT=$(find apps/mac/build -maxdepth 1 -name '*.dmg' -print -quit)
          if [ "$DMG_OUTPUT" != "apps/mac/build/supaterm.dmg" ]; then
            mv "$DMG_OUTPUT" apps/mac/build/supaterm.dmg
          fi
      - name: Notarize and staple
        run: |
          set -euo pipefail
          APP_PATH=$(find apps/mac/build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          NOTARY_RESULT_PATH=apps/mac/build/notarytool-submit.json
          NOTARY_LOG_PATH=apps/mac/build/notarytool-log.json
          NOTARY_STATUS=""
          NOTARY_ID=""
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            submit_exit=0
            if ! xcrun notarytool submit apps/mac/build/supaterm.dmg \
              --keychain-profile "notarytool-profile" \
              --wait \
              --output-format json > "$NOTARY_RESULT_PATH"; then
              submit_exit=$?
            fi
            cat "$NOTARY_RESULT_PATH" || true
            NOTARY_STATUS=$(/usr/bin/python3 -c 'import json, pathlib, sys; p = pathlib.Path(sys.argv[1]); data = json.load(p.open()) if p.exists() else {}; print(data.get("status", ""))' "$NOTARY_RESULT_PATH" 2>/dev/null || true)
            NOTARY_ID=$(/usr/bin/python3 -c 'import json, pathlib, sys; p = pathlib.Path(sys.argv[1]); data = json.load(p.open()) if p.exists() else {}; print(data.get("id", ""))' "$NOTARY_RESULT_PATH" 2>/dev/null || true)
            if [ "$submit_exit" -eq 0 ] && [ "$NOTARY_STATUS" = "Accepted" ]; then
              break
            fi
            if [ -n "$NOTARY_ID" ]; then
              xcrun notarytool log "$NOTARY_ID" --keychain-profile "notarytool-profile" > "$NOTARY_LOG_PATH" || true
              cat "$NOTARY_LOG_PATH" || true
            fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$NOTARY_STATUS'"
            exit 1
          fi
          xcrun stapler staple apps/mac/build/supaterm.dmg
          xcrun stapler staple "$APP_PATH"
      - name: Create app zip
        run: |
          APP_PATH=$(find apps/mac/build/export -maxdepth 3 -name 'supaterm.app' -print -quit)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" apps/mac/build/supaterm.app.zip
      - uses: actions/upload-artifact@v6
        with:
          name: dsyms
          if-no-files-found: error
          path: apps/mac/build/supaterm.xcarchive/dSYMs/**
      - name: Download Sparkle tools
        run: .github/scripts/download_sparkle_tools.sh
      - name: Generate tip appcast
        run: |
          set -euo pipefail
          STAGING=$(mktemp -d)
          cp apps/mac/build/supaterm.app.zip "$STAGING/"
          printf "%s" "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n\t ' | apps/mac/build/sparkle-tools/bin/generate_appcast \
            --download-url-prefix "https://supaterm.com/download/tip/" \
            --maximum-versions 1 \
            --ed-key-file - "$STAGING"
          sed -i '' 's|<enclosure |<sparkle:channel>tip</sparkle:channel>\n            <enclosure |' "$STAGING/appcast.xml"
          cp "$STAGING/appcast.xml" apps/mac/build/appcast.xml
      - name: Generate checksums
        run: |
          /usr/bin/python3 .github/scripts/generate_release_checksums.py tip apps/mac/build/checksums.json \
            apps/mac/build/supaterm.dmg \
            apps/mac/build/supaterm.app.zip
      - uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          if-no-files-found: error
          path: |
            apps/mac/build/supaterm.dmg
            apps/mac/build/supaterm.app.zip
            apps/mac/build/appcast.xml
            apps/mac/build/checksums.json

  posthog-dsym:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      POSTHOG_CLI_HOST: https://us.posthog.com
      POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_CLI_PROJECT_ID }}
      POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SHA }}
      - name: Resolve PostHog credentials
        id: posthog-credentials
        run: |
          if [ -n "$POSTHOG_CLI_PROJECT_ID" ] && [ -n "$POSTHOG_CLI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$POSTHOG_CLI_PROJECT_ID" ] && [ -z "$POSTHOG_CLI_API_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::POSTHOG_CLI_PROJECT_ID and POSTHOG_CLI_API_KEY must be configured together"
          exit 1
      - name: Install posthog-cli
        if: steps.posthog-credentials.outputs.enabled == 'true'
        run: curl --proto '=https' --tlsv1.2 -LsSf https://download.posthog.com/cli | sh
      - uses: actions/download-artifact@v7
        if: steps.posthog-credentials.outputs.enabled == 'true'
        with:
          name: dsyms
          path: dsyms
      - name: Upload dSYMs to PostHog
        if: steps.posthog-credentials.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          test -n "$POSTHOG_CLI_PROJECT_ID"
          test -n "$POSTHOG_CLI_API_KEY"
          POSTHOG_CLI="$HOME/.posthog/posthog-cli"
          if [ ! -x "$POSTHOG_CLI" ]; then
            POSTHOG_CLI=$(command -v posthog-cli)
          fi
          MARKETING_VERSION=$(sed -n 's/^MARKETING_VERSION *= *//p' apps/mac/Configurations/Project.xcconfig)
          "$POSTHOG_CLI" dsym upload \
            --directory dsyms \
            --project app.supabit.supaterm \
            --version "$MARKETING_VERSION" \
            --build "${{ needs.build.outputs.build-number }}"

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: apps/mac/build
      - name: Force-move tip tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa tip -m "Latest Continuous Release" "$RELEASE_SHA"
          git push --force origin tip
      - name: Update tip release
        run: |
          gh release create tip --prerelease --title "Supaterm Tip" --target "$RELEASE_SHA" --notes "" -R "${{ github.repository }}" 2>/dev/null || \
          gh release edit tip --prerelease --title "Supaterm Tip" --target "$RELEASE_SHA" -R "${{ github.repository }}"
          gh release upload tip apps/mac/build/supaterm.dmg apps/mac/build/supaterm.app.zip apps/mac/build/appcast.xml apps/mac/build/checksums.json --clobber -R "${{ github.repository }}"
      - name: Merge tip item into stable appcast
        run: |
          LATEST_TAG=$(gh release list --exclude-drafts --exclude-pre-releases -R "${{ github.repository }}" --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No stable release found"
            exit 1
          fi
          if ! gh release download "$LATEST_TAG" -p "appcast.xml" -O stable_appcast.xml -R "${{ github.repository }}"; then
            echo "::error::Stable release $LATEST_TAG is missing appcast.xml"
            exit 1
          fi
          python3 .github/scripts/merge_appcasts.py stable_appcast.xml apps/mac/build/appcast.xml merged_appcast.xml
          mv merged_appcast.xml appcast.xml
          gh release upload "$LATEST_TAG" appcast.xml --clobber -R "${{ github.repository }}"
