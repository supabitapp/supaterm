name: Setup web build deps
description: Install Bun via mise and cache node_modules

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v3
      with:
        version: 2026.3.0
        cache: true

    - name: Cache node_modules
      uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json', 'packages/*/package.json') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      run: mise exec -- bun install --frozen-lockfile || mise exec -- bun install
