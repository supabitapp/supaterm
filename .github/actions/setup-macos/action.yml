name: Setup macOS build deps
description: Install macOS build dependencies and restore Ghostty build cache

runs:
  using: composite
  steps:
    - name: Select Xcode 26.3
      shell: bash
      run: |
        sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
        xcodebuild -version
    - uses: jdx/mise-action@v4
      with:
        version: 2026.3.0
        cache: true
    - name: Authenticate with Tuist
      shell: bash
      run: |
        for attempt in 1 2 3; do
          if mise exec -- tuist auth login; then
            exit 0
          fi
          if [ "$attempt" = 3 ]; then
            exit 1
          fi
          sleep $((attempt * 10))
        done
    - name: Xcode cache key
      shell: bash
      run: |
        XCODE_VERSION="$(xcodebuild -version | tr '\n' '-' | sed 's/[^A-Za-z0-9._-]/_/g; s/-$//')"
        printf '%s\n' "XCODE_VERSION=$XCODE_VERSION" >> "$GITHUB_ENV"
    - name: Tuist package cache
      uses: actions/cache@v5
      with:
        path: |
          apps/mac/Tuist/.build/repositories
          apps/mac/Tuist/.build/checkouts
          apps/mac/Tuist/.build/artifacts
          apps/mac/Tuist/.build/prebuilts
          apps/mac/Tuist/.build/workspace-state.json
          apps/mac/Tuist/.build/Derived
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-tuist-packages-v1-${{ hashFiles('mise.toml', 'apps/mac/Tuist/Package.swift', 'apps/mac/Tuist/Package.resolved') }}
    - name: Ghostty cache key
      shell: bash
      run: |
        GHOSTTY_SHA="$(git -C apps/mac/ThirdParty/ghostty rev-parse HEAD)"
        printf '%s\n' "GHOSTTY_SHA=$GHOSTTY_SHA" >> "$GITHUB_ENV"
    - name: Ghostty cache
      uses: actions/cache@v5
      with:
        path: apps/mac/.build/ghostty
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ghostty-v2-${{ env.GHOSTTY_SHA }}-${{ hashFiles('.github/actions/setup-macos/action.yml', 'apps/mac/Project.swift', 'apps/mac/scripts/build-ghostty.sh', 'mise.toml', '.gitmodules') }}
    - name: Zmx cache key
      shell: bash
      run: |
        ZMX_SHA="$(git -C apps/mac/ThirdParty/zmx rev-parse HEAD)"
        printf '%s\n' "ZMX_SHA=$ZMX_SHA" >> "$GITHUB_ENV"
    - name: Zmx cache
      uses: actions/cache@v5
      with:
        path: apps/mac/.build/zmx
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-zmx-v1-${{ env.ZMX_SHA }}-${{ hashFiles('.github/actions/setup-macos/action.yml', 'apps/mac/Project.swift', 'apps/mac/scripts/build-zmx.sh', 'mise.toml', '.gitmodules') }}
    - name: Ap cache key
      shell: bash
      run: |
        AP_SHA="$(git -C apps/mac/ThirdParty/coding-agents-session-picker rev-parse HEAD)"
        printf '%s\n' "AP_SHA=$AP_SHA" >> "$GITHUB_ENV"
    - name: Ap cache
      uses: actions/cache@v5
      with:
        path: apps/mac/.build/ap
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ap-v1-${{ env.AP_SHA }}-${{ hashFiles('.github/actions/setup-macos/action.yml', 'apps/mac/Project.swift', 'apps/mac/scripts/build-ap.sh', 'mise.toml', '.gitmodules') }}
