name: Setup macOS build deps
description: Install macOS build deps and build GhosttyKit plus bundled resources

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v3
      with:
        version: 2026.3.0
        cache: true
    - name: Xcode cache key
      shell: bash
      run: |
        XCODE_VERSION="$(xcodebuild -version | tr '\n' '-' | sed 's/[^A-Za-z0-9._-]/_/g; s/-$//')"
        printf '%s\n' "XCODE_VERSION=$XCODE_VERSION" >> "$GITHUB_ENV"
    - name: Ghostty cache key
      shell: bash
      run: |
        GHOSTTY_SHA="$(git -C apps/mac/ThirdParty/ghostty rev-parse HEAD)"
        printf '%s\n' "GHOSTTY_SHA=$GHOSTTY_SHA" >> "$GITHUB_ENV"
    - name: Ghostty cache
      id: ghostty_cache
      uses: actions/cache@v5
      with:
        path: |
          apps/mac/Frameworks/GhosttyKit.xcframework
          apps/mac/Resources/ghostty
          apps/mac/Resources/terminfo
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ghostty-v1-${{ env.GHOSTTY_SHA }}-${{ hashFiles('.github/actions/setup-macos/action.yml', 'Makefile', 'apps/mac/Makefile', 'mise.toml', '.gitmodules') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ghostty-v1-${{ env.GHOSTTY_SHA }}-
          ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ghostty-v1-
    - name: Sync Ghostty build stamp
      if: steps.ghostty_cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        mkdir -p apps/mac/.build/.ghostty-stamps
        rm -f apps/mac/.build/.ghostty-stamps/head-*
        test -d apps/mac/Frameworks/GhosttyKit.xcframework
        test -d apps/mac/Resources/ghostty
        test -d apps/mac/Resources/terminfo
        touch "apps/mac/.build/.ghostty-stamps/head-${GHOSTTY_SHA}"
        touch "apps/mac/.build/.ghostty-stamps/outputs-${GHOSTTY_SHA}"
        touch apps/mac/Frameworks/GhosttyKit.xcframework
    - name: Build ghostty
      if: steps.ghostty_cache.outputs.cache-hit != 'true'
      shell: bash
      run: make mac-build-ghostty-xcframework
