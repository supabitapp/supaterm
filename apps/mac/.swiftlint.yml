strict: true

included:
  - supaterm
  - supatermTests

disabled_rules:
  - file_length
  - closure_parameter_position
  - type_body_length
  - identifier_name
  - trailing_comma

opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - async_without_await
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discarded_notification_center_observer
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - last_where
  - private_swiftui_state
  - redundant_nil_coalescing
  - reduce_into
  - sorted_first_last
  - superfluous_else
  - toggle_bool
  - unhandled_throwing_task
  - weak_delegate
  - yoda_condition

opening_brace:
  ignore_multiline_function_signatures: true
  ignore_multiline_statement_conditions: true
  ignore_multiline_type_headers: true

cyclomatic_complexity:
  warning: 15
  error: 20

function_body_length:
  warning: 100
  error: 150

explicit_init:
  include_bare_init: true
  severity: error

redundant_discardable_let:
  ignore_swiftui_view_bodies: true

custom_rules:
  store_state_mutation_in_views:
    name: "Store State Mutation In Views"
    regex: "\\bstore\\.[A-Za-z0-9_]+\\s*(?:\\+=|-=|\\*=|/=|=(?!=))"
    message: "Do not mutate store state directly in views. Send actions instead."
    severity: error
    included: "supaterm/.*/Views/.*\\.swift"
